name: build

# Builds pywhispercpp wheels for every (platform x GPU backend) Aleph
# supports and attaches them to the release that the tag points at.
#
# Tag format: v<upstream>-aleph<n>, e.g. v1.3.0-aleph1.
#
# Per-platform GPU backends are encoded as a PEP 440 local-version segment
# in the wheel filename:
#   pywhispercpp-1.3.0+vulkan-cp312-cp312-linux_x86_64.whl
#   pywhispercpp-1.3.0+cuda12-cp312-cp312-linux_x86_64.whl
#   pywhispercpp-1.3.0+metal-cp312-cp312-macosx_11_0_arm64.whl
#   pywhispercpp-1.3.0+vulkan-cp312-cp312-win_amd64.whl
#
# pip accepts the +<segment> on install; we rewrite the wheel after build
# (unpack -> patch METADATA Version -> pack) so the filename and the
# in-wheel metadata agree.

on:
  push:
    tags:
      - 'v*-aleph*'
  workflow_dispatch:
    inputs:
      version:
        description: 'pywhispercpp PyPI version to build (e.g. 1.3.0)'
        required: true

env:
  # PyPI version of pywhispercpp to build. Keep in sync with the part of
  # the release tag before "-aleph". workflow_dispatch overrides via inputs.
  PYWHISPERCPP_VERSION: 1.3.0

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64-vulkan
            # ubuntu-latest = 24.04, glibc 2.39 → manylinux_2_39 target.
            runner: ubuntu-latest
            python: '3.12'
            cmake_args: '-DGGML_VULKAN=on'
            asset_local_version: vulkan
            asset_platform: linux_x86_64
            manylinux_tag: manylinux_2_39_x86_64
          - target: linux-x86_64-cuda12
            # Pin to 22.04 — Jimver/cuda-toolkit@v0.2.16 fetches
            # cuda-keyring_1.0-1_all.deb which only exists for ubuntu2204.
            # 24.04's repo uses keyring_1.1 and the action 404s.
            # 22.04 = glibc 2.35 → manylinux_2_34 (next-lowest supported).
            runner: ubuntu-22.04
            python: '3.12'
            cmake_args: '-DGGML_CUDA=on'
            cuda_version: '12.4.1'
            asset_local_version: cuda12
            asset_platform: linux_x86_64
            manylinux_tag: manylinux_2_34_x86_64
          - target: darwin-aarch64-metal
            runner: macos-14
            python: '3.12'
            cmake_args: '-DGGML_METAL=on'
            asset_local_version: metal
            asset_platform: macosx_11_0_arm64
          - target: windows-x86_64-vulkan
            runner: windows-latest
            python: '3.12'
            cmake_args: '-DGGML_VULKAN=on'
            asset_local_version: vulkan
            asset_platform: win_amd64
          - target: windows-x86_64-cuda12
            runner: windows-latest
            python: '3.12'
            cmake_args: '-DGGML_CUDA=on'
            cuda_version: '12.4.1'
            asset_local_version: cuda12
            asset_platform: win_amd64
    steps:
      - name: Resolve pywhispercpp version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            # Tag is v<upstream>-aleph<n>; strip the leading v and -aleph<n>.
            v="${GITHUB_REF_NAME#v}"
            v="${v%-aleph*}"
          fi
          echo "pywhispercpp=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # --- GPU toolchains -------------------------------------------------

      - name: Install Vulkan SDK (Linux)
        if: matrix.asset_local_version == 'vulkan' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools glslc

      - name: Install Vulkan SDK (Windows)
        if: matrix.asset_local_version == 'vulkan' && runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install CUDA Toolkit (Linux)
        if: matrix.asset_local_version == 'cuda12' && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network
          # CUDA 12.x renamed cuda-cublas-* to libcublas-*; cublas now lives
          # outside the cuda-* package family, so it needs the
          # non-cuda-sub-packages parameter.
          sub-packages: '["nvcc","cudart"]'
          non-cuda-sub-packages: '["libcublas","libcublas-dev"]'

      - name: Install CUDA Toolkit (Windows)
        if: matrix.asset_local_version == 'cuda12' && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network
          # Windows sub-package names differ from Linux. nvcc + visual_studio_integration
          # are required so CMake's CUDA detection picks up the toolchain;
          # cublas / cublas_dev ship as standard sub-packages on the Windows installer.
          sub-packages: '["nvcc","cudart","cublas","cublas_dev","visual_studio_integration"]'

      # macOS Metal needs nothing extra — Xcode CLT is preinstalled on macos-14.

      # Windows: pywhispercpp's setup.py hard-codes a `bin/Release/` DLL
      # output dir which only MSBuild produces; with Ninja the DLLs go to
      # `bin/` and delvewheel fails to find them. Stay on MSBuild and
      # instead shorten TMP to give MSBuild's FileTracker enough MAX_PATH
      # headroom on the deeply nested try-compile paths.
      - name: Short TMP for MSBuild (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /c/T
          echo "TEMP=C:\\T" >> "$GITHUB_ENV"
          echo "TMP=C:\\T" >> "$GITHUB_ENV"
          echo "PIP_CACHE_DIR=C:\\pc" >> "$GITHUB_ENV"

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel "setuptools>=68" cmake

      # --- Build the wheel from source -----------------------------------

      - name: Build wheel
        shell: bash
        env:
          # CMAKE_POLICY_VERSION_MINIMUM unblocks pywhispercpp's bundled
          # pybind11 (which still declares cmake_minimum_required<3.5);
          # CMake 4 removed that compat shim.
          CMAKE_ARGS: "${{ matrix.cmake_args }} -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        run: |
          set -eux
          # macos-14 is Apple Silicon only. pywhispercpp's setup.py defaults
          # to a `macosx_10_13_universal2` wheel tag; repairwheel/delocate
          # then validates and bails because the build produced no x86_64
          # binaries. Force arm64-only.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            export _PYTHON_HOST_PLATFORM=macosx-11.0-arm64
            export ARCHFLAGS="-arch arm64"
          fi
          mkdir -p dist

          # GPU backends on Linux + Windows need a special path:
          # pywhispercpp's setup.py invokes repairwheel which bundles the
          # GPU driver library. Those are system libs that MUST come from
          # the user's NVIDIA / Mesa Vulkan stack at runtime, not from the
          # wheel (the bundled libvulkan/libcuda built against the CI's
          # Vulkan SDK / driver stub is incompatible with arbitrary host
          # drivers — produces `vk::createInstance: ErrorIncompatibleDriver`
          # and similar). Strategy: extract source, neuter the
          # repair_wheel call, build with `python setup.py bdist_wheel`
          # (keeps build/ dir inside source tree so we can locate the
          # bundled libwhisper/ggml afterwards), then run the platform
          # repair tool manually with the right --exclude.
          # macOS Metal is standard — no driver-loader lib involved.
          if [[ "$RUNNER_OS" != "macOS" && "${{ matrix.asset_local_version }}" != "" ]]; then
            case "${{ matrix.asset_local_version }}-$RUNNER_OS" in
              cuda12-Linux)   exclude_lib="libcuda.so.1" ;;
              cuda12-Windows) exclude_lib="nvcuda.dll" ;;
              vulkan-Linux)   exclude_lib="libvulkan.so.1" ;;
              vulkan-Windows) exclude_lib="vulkan-1.dll" ;;
            esac
          else
            exclude_lib=""
          fi
          if [[ -n "$exclude_lib" ]]; then
            python -m pip install scikit-build cmake pybind11 setuptools wheel
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              python -m pip install auditwheel patchelf
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              python -m pip install delvewheel
            fi
            mkdir -p src
            pip download "pywhispercpp==${{ steps.ver.outputs.pywhispercpp }}" \
              --no-deps --no-binary :all: -d src/
            ( cd src && tar xzf pywhispercpp-*.tar.gz )
            srcdir="$(ls -d src/pywhispercpp-*/ | head -n1)"
            python - <<PY
          import re, pathlib
          p = pathlib.Path("${srcdir}setup.py")
          code = p.read_text(encoding="utf-8")
          new = re.sub(r"self\.repair_wheel\([^)]*\)",
                       "pass  # repair disabled (runs externally)",
                       code)
          assert new != code, "could not locate repair_wheel call in setup.py"
          p.write_text(new, encoding="utf-8")
          PY
            # pywhispercpp's setup.py uses setuptools-scm/vcs_versioning
            # which falls back to 0.0.0 when no git history is present
            # (our extracted tarball has none). Force the version so the
            # produced wheel filename + METADATA carry the right tag.
            ( cd "$srcdir" && SETUPTOOLS_SCM_PRETEND_VERSION="${{ steps.ver.outputs.pywhispercpp }}" python setup.py bdist_wheel )
            unrepaired="$(ls "$srcdir"dist/pywhispercpp-*.whl | head -n1)"
            mkdir -p dist
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              auditwheel repair \
                --exclude "$exclude_lib" \
                --plat "${{ matrix.manylinux_tag }}" \
                "$unrepaired" -w dist/
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              dllsrc_unix="$srcdir/build/temp.win-amd64-cpython-312/Release/_pywhispercpp/bin/Release"
              dllsrc="$(cygpath -w "$dllsrc_unix")"
              python -m delvewheel repair \
                --exclude "$exclude_lib" \
                --add-path "$dllsrc" \
                "$unrepaired" --wheel-dir dist
            fi
          else
            # Standard path: pip wheel --no-binary forces a from-source
            # build of pywhispercpp, respecting CMAKE_ARGS for the embedded
            # whisper.cpp configure. The setup.py's repair step runs and
            # bundles libwhisper/libggml into the wheel.
            pip wheel "pywhispercpp==${{ steps.ver.outputs.pywhispercpp }}" \
              --no-deps --no-binary=pywhispercpp -w dist/
          fi

      # --- Rewrite wheel filename + METADATA to embed +<backend> ---------
      #
      # `pip download/wheel` produces something like:
      #   pywhispercpp-1.3.0-cp312-cp312-<plat>.whl
      # We unpack it, edit the Version line in *.dist-info/METADATA to
      # `Version: 1.3.0+<backend>`, then `wheel pack` writes a new wheel
      # whose filename automatically reflects the new version.
      - name: Rewrite wheel with local-version segment
        shell: bash
        run: |
          set -eux
          cd dist
          orig="$(ls pywhispercpp-*.whl | head -n1)"
          echo "Original wheel: $orig"
          mkdir _unpacked
          python -m wheel unpack "$orig" -d _unpacked
          unpacked_dir="$(find _unpacked -maxdepth 1 -mindepth 1 -type d | head -n1)"
          metadata="$(find "$unpacked_dir" -name METADATA -path '*.dist-info/*' | head -n1)"
          echo "METADATA at: $metadata"
          # Patch the Version: line in-place; tolerate macOS BSD sed.
          python - <<PY
          import pathlib, re
          p = pathlib.Path("$metadata")
          s = p.read_text(encoding="utf-8")
          new = re.sub(
            r'^(Version:\s*)([^\s+]+)(\+[^\s]+)?\s*$',
            r'\g<1>\g<2>+${{ matrix.asset_local_version }}',
            s, count=1, flags=re.MULTILINE,
          )
          assert new != s, "Version: line not patched"
          p.write_text(new, encoding="utf-8")
          PY
          # `wheel pack` reads the new Version from METADATA but strips
          # the PEP 440 local-version segment from the filename it writes.
          # pip itself accepts +<segment> in wheel filenames, so we rename
          # the packed wheel afterwards to include +<backend>.
          rm "$orig"
          python -m wheel pack "$unpacked_dir" -d .
          packed="$(ls pywhispercpp-*.whl | head -n1)"
          # Insert +<backend> after the version, before the cp312 tag.
          renamed="$(echo "$packed" | sed -E "s/^(pywhispercpp-[0-9]+\.[0-9]+\.[0-9]+)(-cp[0-9]+)/\1+${{ matrix.asset_local_version }}\2/")"
          if [[ "$packed" != "$renamed" ]]; then
            mv "$packed" "$renamed"
          fi
          rm -rf _unpacked
          ls -la

      - name: Compute SHA256
        shell: bash
        run: |
          cd dist
          whl="$(ls pywhispercpp-*.whl | head -n1)"
          if command -v sha256sum >/dev/null; then
            sha256sum "$whl" > "$whl.sha256"
          else
            shasum -a 256 "$whl" > "$whl.sha256"
          fi
          cat "$whl.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.whl
            dist/*.whl.sha256

  release:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    # always() lets the release job run even when some matrix entries
    # failed — partial-success releases ship whatever artifacts succeeded.
    # softprops/action-gh-release@v2 ignores empty asset lists, so a total
    # failure produces no release (no spurious empty tag).
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten + combine SHA256SUMS
        shell: bash
        run: |
          mkdir -p out
          find artifacts -type f -name '*.whl' -exec cp {} out/ \;
          ( cd out && for f in *.whl; do
              [ -f "$f" ] || continue
              sha256sum "$f"
            done ) > out/SHA256SUMS
          cat out/SHA256SUMS

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
