name: build

# Builds pywhispercpp wheels for every (platform x GPU backend) Aleph
# supports and attaches them to the release that the tag points at.
#
# Tag format: v<upstream>-aleph<n>, e.g. v1.3.0-aleph1.
#
# Per-platform GPU backends are encoded as a PEP 440 local-version segment
# in the wheel filename:
#   pywhispercpp-1.3.0+vulkan-cp312-cp312-linux_x86_64.whl
#   pywhispercpp-1.3.0+cuda12-cp312-cp312-linux_x86_64.whl
#   pywhispercpp-1.3.0+metal-cp312-cp312-macosx_11_0_arm64.whl
#   pywhispercpp-1.3.0+vulkan-cp312-cp312-win_amd64.whl
#
# pip accepts the +<segment> on install; we rewrite the wheel after build
# (unpack -> patch METADATA Version -> pack) so the filename and the
# in-wheel metadata agree.

on:
  push:
    tags:
      - 'v*-aleph*'
  workflow_dispatch:
    inputs:
      version:
        description: 'pywhispercpp PyPI version to build (e.g. 1.3.0)'
        required: true

env:
  # PyPI version of pywhispercpp to build. Keep in sync with the part of
  # the release tag before "-aleph". workflow_dispatch overrides via inputs.
  PYWHISPERCPP_VERSION: 1.3.0

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64-vulkan
            runner: ubuntu-latest
            python: '3.12'
            cmake_args: '-DGGML_VULKAN=on'
            asset_local_version: vulkan
            asset_platform: linux_x86_64
          - target: linux-x86_64-cuda12
            # Pin to 22.04 — Jimver/cuda-toolkit@v0.2.16 fetches
            # cuda-keyring_1.0-1_all.deb which only exists for ubuntu2204.
            # 24.04's repo uses keyring_1.1 and the action 404s.
            runner: ubuntu-22.04
            python: '3.12'
            cmake_args: '-DGGML_CUDA=on'
            cuda_version: '12.4.1'
            asset_local_version: cuda12
            asset_platform: linux_x86_64
          - target: darwin-aarch64-metal
            runner: macos-14
            python: '3.12'
            cmake_args: '-DGGML_METAL=on'
            asset_local_version: metal
            asset_platform: macosx_11_0_arm64
          - target: windows-x86_64-vulkan
            runner: windows-latest
            python: '3.12'
            cmake_args: '-DGGML_VULKAN=on'
            asset_local_version: vulkan
            asset_platform: win_amd64
    steps:
      - name: Resolve pywhispercpp version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            # Tag is v<upstream>-aleph<n>; strip the leading v and -aleph<n>.
            v="${GITHUB_REF_NAME#v}"
            v="${v%-aleph*}"
          fi
          echo "pywhispercpp=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # --- GPU toolchains -------------------------------------------------

      - name: Install Vulkan SDK (Linux)
        if: matrix.asset_local_version == 'vulkan' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools glslc

      - name: Install Vulkan SDK (Windows)
        if: matrix.asset_local_version == 'vulkan' && runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install CUDA Toolkit (Linux)
        if: matrix.asset_local_version == 'cuda12' && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas-dev"]'

      # macOS Metal needs nothing extra — Xcode CLT is preinstalled on macos-14.

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel "setuptools>=68" cmake

      # --- Build the wheel from source -----------------------------------

      - name: Build wheel
        shell: bash
        env:
          # CMAKE_POLICY_VERSION_MINIMUM unblocks pywhispercpp's bundled
          # pybind11 (which still declares cmake_minimum_required<3.5);
          # CMake 4 removed that compat shim.
          CMAKE_ARGS: "${{ matrix.cmake_args }} -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        run: |
          set -eux
          mkdir -p dist
          # pip wheel --no-binary forces a from-source build of pywhispercpp,
          # respecting CMAKE_ARGS for the embedded whisper.cpp configure.
          pip wheel "pywhispercpp==${{ steps.ver.outputs.pywhispercpp }}" \
            --no-deps --no-binary=pywhispercpp -w dist/

      # --- Rewrite wheel filename + METADATA to embed +<backend> ---------
      #
      # `pip download/wheel` produces something like:
      #   pywhispercpp-1.3.0-cp312-cp312-<plat>.whl
      # We unpack it, edit the Version line in *.dist-info/METADATA to
      # `Version: 1.3.0+<backend>`, then `wheel pack` writes a new wheel
      # whose filename automatically reflects the new version.
      - name: Rewrite wheel with local-version segment
        shell: bash
        run: |
          set -eux
          cd dist
          orig="$(ls pywhispercpp-*.whl | head -n1)"
          echo "Original wheel: $orig"
          mkdir _unpacked
          python -m wheel unpack "$orig" -d _unpacked
          unpacked_dir="$(find _unpacked -maxdepth 1 -mindepth 1 -type d | head -n1)"
          metadata="$(find "$unpacked_dir" -name METADATA -path '*.dist-info/*' | head -n1)"
          echo "METADATA at: $metadata"
          # Patch the Version: line in-place; tolerate macOS BSD sed.
          python - <<PY
          import pathlib, re
          p = pathlib.Path("$metadata")
          s = p.read_text(encoding="utf-8")
          new = re.sub(
            r'^(Version:\s*)([^\s+]+)(\+[^\s]+)?\s*$',
            r'\g<1>\g<2>+${{ matrix.asset_local_version }}',
            s, count=1, flags=re.MULTILINE,
          )
          assert new != s, "Version: line not patched"
          p.write_text(new, encoding="utf-8")
          PY
          # `wheel pack` derives the new filename from METADATA's Version.
          rm "$orig"
          python -m wheel pack "$unpacked_dir" -d .
          rm -rf _unpacked
          ls -la

      - name: Compute SHA256
        shell: bash
        run: |
          cd dist
          whl="$(ls pywhispercpp-*.whl | head -n1)"
          if command -v sha256sum >/dev/null; then
            sha256sum "$whl" > "$whl.sha256"
          else
            shasum -a 256 "$whl" > "$whl.sha256"
          fi
          cat "$whl.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.whl
            dist/*.whl.sha256

  release:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + combine SHA256SUMS
        shell: bash
        run: |
          mkdir -p out
          find artifacts -type f -name '*.whl' -exec cp {} out/ \;
          ( cd out && for f in *.whl; do
              [ -f "$f" ] || continue
              sha256sum "$f"
            done ) > out/SHA256SUMS
          cat out/SHA256SUMS

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
